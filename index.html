<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastPhoto Pro - Studio Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo"><i class="fa-solid fa-camera-retro"></i> FastPhoto <span>PRO</span></div>
        <div class="top-controls">
            <div class="history-group">
                <button id="undo-btn" class="icon-btn" title="Annulla"><i class="fa-solid fa-rotate-left"></i></button>
                <button id="redo-btn" class="icon-btn" title="Ripristina"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <label for="upload-btn" class="main-cta"><i class="fa-solid fa-image"></i> Apri Sfondo</label>
            <input type="file" id="upload-btn" accept="image/*">
        </div>
    </header>

    <div class="app-container">
        <main class="editor-workspace" id="workspace">
            <canvas id="photo-canvas"></canvas>
            <div id="no-photo-msg">
                <i class="fa-solid fa-mountain-sun"></i>
                <p>Carica una foto per iniziare il montaggio</p>
            </div>
            <div class="zoom-bar" style="display: none;">
                <button id="zoom-out"><i class="fa-solid fa-minus"></i></button>
                <span id="zoom-val">100%</span>
                <button id="zoom-in"><i class="fa-solid fa-plus"></i></button>
                <button id="zoom-fit"><i class="fa-solid fa-expand"></i></button>
            </div>
        </main>

        <aside class="side-panel">
            <div class="panel-section">
                <div class="histogram-container"><canvas id="hist-canvas" width="310" height="80"></canvas></div>
            </div>

            <div class="panel-section">
                <h2><i class="fa-solid fa-bezier-curve"></i> Curve di Tono</h2>
                <div class="curve-container">
                    <canvas id="curve-canvas" width="256" height="256"></canvas>
                    <p class="curve-hint">Trascina il punto centrale per modificare le luci/ombre</p>
                </div>
            </div>

            <div class="panel-section">
                <h2><i class="fa-solid fa-layer-group"></i> Livelli</h2>
                <div id="layers-list" class="layers-list"></div>
                <div class="layer-btns">
                    <label for="add-layer-btn" class="btn-sub"><i class="fa-solid fa-plus"></i> Aggiungi</label>
                    <input type="file" id="add-layer-btn" accept="image/*" style="display:none;">
                    <button id="del-layer-btn" class="btn-sub"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div id="layer-settings" class="mini-settings" style="display: none;">
                    <label>Opacità</label>
                    <input type="range" id="layer-opacity" min="0" max="100" value="100">
                    <select id="layer-blend" class="pro-select">
                        <option value="source-over">Normale</option>
                        <option value="multiply">Moltiplica</option>
                        <option value="screen">Scolora</option>
                        <option value="overlay">Sovrapponi</option>
                    </select>
                </div>
            </div>

            <div class="panel-section">
                <h2><i class="fa-solid fa-wand-magic-sparkles"></i> Filtri Rapidi</h2>
                <div class="presets-grid">
                    <button class="preset-card" data-preset="normal">Reset</button>
                    <button class="preset-card" data-preset="vintage">Vintage</button>
                    <button class="preset-card" data-preset="cinematic">Film</button>
                    <button class="preset-card" data-preset="bw">B/N Pro</button>
                </div>
            </div>

            <div class="panel-section">
                <h2><i class="fa-solid fa-sliders"></i> Sviluppo Base</h2>
                <div class="slider-group pro-slider">
                    <div class="slider-info"><span>✨ Nitidezza</span><span id="sharpness-val">0</span></div>
                    <input type="range" id="sharpness-slider" min="0" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-info"><span>🌡 Temp.</span><span id="temp-val">0</span></div>
                    <input type="range" id="temp-slider" min="-50" max="50" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-info"><span>☀️ Esposizione</span><span id="exposure-val">0</span></div>
                    <input type="range" id="exposure-slider" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-info"><span>🌓 Contrasto</span><span id="contrast-val">0</span></div>
                    <input type="range" id="contrast-slider" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-info"><span>🌑 Ombre</span><span id="shadows-val">0</span></div>
                    <input type="range" id="shadows-slider" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-info"><span>🎨 Saturazione</span><span id="saturation-val">100%</span></div>
                    <input type="range" id="saturation-slider" min="0" max="200" value="100">
                </div>
            </div>

            <div class="panel-section">
                <h2><i class="fa-solid fa-pen-nib"></i> Testo</h2>
                <div class="text-tool">
                    <input type="text" id="watermark-text" placeholder="Scrivi firma...">
                    <input type="color" id="watermark-color" value="#ffffff">
                    <button id="text-btn" class="btn-tool"><i class="fa-solid fa-font"></i></button>
                </div>
            </div>

            <div class="footer-actions">
                <div class="btn-row">
                    <button id="crop-btn" class="btn-tool"><i class="fa-solid fa-crop"></i> Taglia</button>
                    <button id="rotate-btn" class="btn-tool"><i class="fa-solid fa-rotate"></i> Ruota</button>
                </div>
                <button id="download-btn" class="btn-save"><i class="fa-solid fa-file-export"></i> Esporta Foto</button>
            </div>
        </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
